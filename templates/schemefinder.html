<!DOCTYPE html>
<html>
<head>
  <title>Gov Scheme Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 600px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px 20px;
      cursor: pointer;
    }

    .scheme {
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
    }

    .eligible { background: #e8f5e9; }
    .not-eligible { background: #ffebee; }
  </style>
</head>

<body>

<div class="container">
  <h2>Scheme Finder</h2>

  <input type="number" id="farmerId" placeholder="Enter Farmer ID">
  <button onclick="findSchemes()">Find Schemes</button>

  <div id="results"></div>
</div>

<script>

function findSchemes(){
  const farmerId = document.getElementById("farmerId").value;

  if(!farmerId){
    alert("Enter Farmer ID");
    return;
  }

  fetch(`https://fawp-project.onrender.com/api/match/${farmerId}`)
    .then(res => res.json())
    .then(data => {

      let html = "<h3>✅ Eligible Schemes</h3>";

      data.eligible.forEach(s => {
        html += `<div class="scheme eligible">
          ${s.scheme_name} <br>
          <small>${s.reason}</small>
        </div>`;
      });

      html += "<h3>❌ Not Eligible</h3>";

      data.not_eligible.forEach(s => {
        html += `<div class="scheme not-eligible">
          ${s.scheme_name} <br>
          <small>${s.reason}</small>
        </div>`;
      });

      document.getElementById("results").innerHTML = html;
    })
    .catch(err => {
      console.error(err);
      alert("Error connecting to backend");
    });
}

</script>

</body>
</html>
